version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: todouser
      POSTGRES_PASSWORD: todopass
      POSTGRES_DB: tododb
    volumes:
      - todo-db-data:/var/lib/postgresql/data
    networks:
      - todo-network

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://todouser:todopass@db:5432/tododb
    depends_on:
      - db
    networks:
      - todo-network

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge

volumes:
  todo-db-data: